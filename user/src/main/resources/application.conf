ktor {
  deployment {
    port = 10103
  }
  application {
    modules = [cherhy.example.ApplicationKt.module]
  }
}

DB_HOST = "host.docker.internal"
DB_HOST = ${?DB_HOST}

DB_PASSWORD = "postgres"
DB_PASSWORD = ${?DB_PASSWORD}

database {
  master {
    datasource {
      url = "r2dbc:postgresql://"${DB_HOST}":5432/user"
      username = "postgres"
      password = ${DB_PASSWORD}
      max-pool-size = 10
    }
  }
  slave {
    datasource {
      # TODO: slave DB URL - should point to actual replica in production
      url = "r2dbc:postgresql://"${DB_HOST}":5432/user"
      username = "postgres"
      password = ${DB_PASSWORD}
      max-pool-size = 10
    }
  }
  reset-on-boot = true
}

JWT_SECRET = "streaming-platform-jwt-secret-key-2024"
JWT_SECRET = ${?JWT_SECRET}

jwt {
  secret = ${JWT_SECRET}
  issuer = "http://0.0.0.0:10103/"
  audience = "http://0.0.0.0:10103/hello"
  realm = "Access to 'hello'"
  expiration = 3600
  refresh-expiration = 86400
}
