ktor {
  deployment {
    port = 10103
  }
  application {
    modules = [cherhy.example.ApplicationKt.module]
  }
}

database {
  master {
    datasource {
      url = "r2dbc:postgresql://host.docker.internal:5432/user"
      username = "postgres"
      password = "postgres"
      max-pool-size = 10
    }
  }
  slave {
    datasource {
      url = "r2dbc:postgresql://host.docker.internal:5432/user"
      username = "postgres"
      password = "postgres"
      max-pool-size = 10
    }
  }
  reset-on-boot = true
}

jwt {
  secret = "streaming-platform-jwt-secret-key-2024"
  issuer = "http://0.0.0.0:10103/"
  audience = "http://0.0.0.0:10103/hello"
  realm = "Access to 'hello'"
  expiration = 3600
  refresh-expiration = 86400
}