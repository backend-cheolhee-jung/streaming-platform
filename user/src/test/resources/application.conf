ktor {
  deployment {
    port = 10103
  }
  application {
    modules = [cherhy.example.ApplicationKt.module]
  }
}

database {
  master {
    datasource {
      url = "jdbc:postgresql://localhost:5432/user_test"
      username = "postgres"
      password = "postgres"
      driver-class-name = "org.postgresql.Driver"
      max-pool-size = 5
      isolation-level = "TRANSACTION_REPEATABLE_READ"
    }
  }
  slave {
    datasource {
      url = "jdbc:postgresql://localhost:5432/user_test"
      username = "postgres"
      password = "postgres"
      driver-class-name = "org.postgresql.Driver"
      max-pool-size = 5
      isolation-level = "TRANSACTION_REPEATABLE_READ"
    }
  }
}

jwt {
  secret = "test-secret-key-for-unit-testing-purposes"
  issuer = "http://0.0.0.0:10103/"
  audience = "http://0.0.0.0:10103/hello"
  realm = "Access to 'hello'"
  expiration = 3600
  refresh-expiration = 86400
}
